name: Android Build

on:
  push:
    branches: [ "main", "master" ]
  workflow_dispatch:

jobs:
  build-android:
    runs-on: ubuntu-latest

    steps:
    - name: Checkout Code
      uses: actions/checkout@v4

    - name: Setup Node.js
      uses: actions/setup-node@v4
      with:
        node-version: 22

    - name: Install Dependencies
      run: npm install

    - name: Build Web App
      run: npm run build

    - name: Capacitor Sync
      run: npx cap sync android

    - name: Setup Java JDK
      uses: actions/setup-java@v4
      with:
        distribution: 'temurin'
        java-version: '21'

    - name: Setup Android SDK
      uses: android-actions/setup-android@v3

    - name: Build Android App (Debug APK & Release AAB)
      run: |
        cd android
        # Remove any potential lock files or previous build artifacts
        rm -rf .gradle build app/build
        chmod +x gradlew
        # View signing report to get SHA-1
        ./gradlew signingReport
        # Run clean build
        ./gradlew clean
        ./gradlew assembleDebug --stacktrace
        ./gradlew bundleRelease --stacktrace

    - name: Get current date and time
      id: date
      run: echo "date=$(date +'%Y%m%d_%H%M')" >> $GITHUB_OUTPUT

    - name: Rename APK and AAB files
      run: |
        mv android/app/build/outputs/apk/debug/app-debug.apk android/app/build/outputs/apk/debug/runningsaga_${{ steps.date.outputs.date }}.apk
        mv android/app/build/outputs/bundle/release/app-release.aab android/app/build/outputs/bundle/release/runningsaga_${{ steps.date.outputs.date }}.aab

    - name: Upload Debug APK (For Phone Testing)
      uses: actions/upload-artifact@v4
      with:
        name: runningsaga-apk-${{ steps.date.outputs.date }}
        path: android/app/build/outputs/apk/debug/runningsaga_${{ steps.date.outputs.date }}.apk

    - name: Upload Release AAB (For Play Store)
      uses: actions/upload-artifact@v4
      with:
        name: runningsaga-aab-${{ steps.date.outputs.date }}
        path: android/app/build/outputs/bundle/release/runningsaga_${{ steps.date.outputs.date }}.aab
